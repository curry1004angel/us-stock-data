name: 일별 주가 수집

on:
  schedule:
    # 미국 정규장 마감(ET 16:00) 이후 = UTC 23:00 평일 (서머타임 무관하게 마감 후)
    - cron: '0 23 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: '수집 날짜 (YYYYMMDD, 비워두면 최근 거래일 자동 감지)'
        required: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt

      - name: 주가 수집
        run: python scripts/fetch_prices.py ${{ github.event.inputs.date || '' }}

      - name: 트렌드 템플릿 스크리닝
        run: python scripts/trend_template.py

      - name: 추정 베이스 계산
        run: python scripts/compute_bases.py

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices/ data/screener/
          git diff --staged --quiet || git commit -m "주가 업데이트: $(date -u +%Y%m%d)"
          git pull --rebase
          git push
